name: CI

# Enforces the same gates the project expects locally (build, format+lint, typecheck, dead-code,
# unit tests) across the declared Node floor (>=22) and the dev version (24). The live integration
# suite is intentionally NOT run here — it needs a real Molten box, secrets, and RUN_LIVE;
# `npm test` is the offline unit suite and is safe in CI.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lower bound = the engines.node floor; upper = the .nvmrc/dev version. Testing both keeps
        # the "Node 22+" claim honest instead of asserting an untested floor.
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build (tsc + page bundle)
        run: npm run build

      - name: Format + lint (biome)
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Dead-code check (knip)
        run: npm run knip

      - name: Unit tests
        run: npm test
